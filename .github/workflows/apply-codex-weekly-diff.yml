name: Apply Codex weekly diff patch

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  patch:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Patch userscript
        run: |
          python3 <<'PY'
          from pathlib import Path

          path = Path('chatgpt-checker-next.user.js')
          text = path.read_text(encoding='utf-8')

          text = text.replace(
              'https://github.com/zetaloop/chatgpt-checker-next',
              'https://github.com/xJogger/chatgpt-checker-next',
          )

          ui_old = '            重置时间：<span id="codex-reset-time-week">...</span>\n            <div id="codex-review-container"'
          ui_new = '            重置时间：<span id="codex-reset-time-week">...</span><br>\n            差值：<span id="codex-usage-week-diff">...</span>\n            <div id="codex-review-container"'
          if 'codex-usage-week-diff' not in text:
              if ui_old not in text:
                  raise RuntimeError('Codex weekly UI insertion point not found')
              text = text.replace(ui_old, ui_new, 1)

          helper = '''    function formatCodexSignedPercent(value) {
        if (typeof value !== "number" || !Number.isFinite(value)) return "...";
        const rounded = Math.round(value * 10) / 10;
        const normalized = Object.is(rounded, -0) ? 0 : rounded;
        const sign = normalized > 0 ? "+" : "";
        return `${sign}${normalized.toFixed(1)}%`;
    }

    function updateCodexWeeklyUsageDiff() {
        const diffEl = document.getElementById("codex-usage-week-diff");
        if (!diffEl) return;

        const limitSecs = codexLimitWindowSecondsSecondary;
        const isNotStarted = isCodexTimerNotStarted(
            limitSecs,
            codexResetsAfterSecondary,
        );
        const remainingSecs =
            codexResetTimeSecondary != null
                ? Math.max(
                      0,
                      (codexResetTimeSecondary - Date.now()) / 1000,
                  )
                : codexResetsAfterSecondary;

        if (
            codexUsedPercentSecondary == null ||
            typeof limitSecs !== "number" ||
            !Number.isFinite(limitSecs) ||
            limitSecs <= 0 ||
            typeof remainingSecs !== "number" ||
            !Number.isFinite(remainingSecs) ||
            isNotStarted
        ) {
            diffEl.innerText = "...";
            diffEl.removeAttribute("title");
            return;
        }

        const theoreticalUsedPercent = Math.max(
            0,
            Math.min(100, (1 - remainingSecs / limitSecs) * 100),
        );
        const diffPercent = codexUsedPercentSecondary - theoreticalUsedPercent;
        diffEl.innerText = formatCodexSignedPercent(diffPercent);
        diffEl.title = `实际已用 ${codexUsedPercentSecondary.toFixed(1)}%，理论已用 ${theoreticalUsedPercent.toFixed(1)}%`;
    }

'''
          func_marker = '    function updateCodexCountdown() {'
          if 'function updateCodexWeeklyUsageDiff()' not in text:
              if func_marker not in text:
                  raise RuntimeError('updateCodexCountdown insertion point not found')
              text = text.replace(func_marker, helper + func_marker, 1)

          call_old = '''        } else {
            resetR.removeAttribute("title");
        }
    }
    setInterval(updateCodexCountdown, 1000);'''
          call_new = '''        } else {
            resetR.removeAttribute("title");
        }
        updateCodexWeeklyUsageDiff();
    }
    setInterval(updateCodexCountdown, 1000);'''
          if '        updateCodexWeeklyUsageDiff();\n    }\n    setInterval(updateCodexCountdown, 1000);' not in text:
              if call_old not in text:
                  raise RuntimeError('updateCodexCountdown call insertion point not found')
              text = text.replace(call_old, call_new, 1)

          path.write_text(text, encoding='utf-8')
          PY

      - name: Check JavaScript syntax
        run: node --check chatgpt-checker-next.user.js

      - name: Commit patch and remove workflow
        run: |
          rm .github/workflows/apply-codex-weekly-diff.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add chatgpt-checker-next.user.js .github/workflows/apply-codex-weekly-diff.yml
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Add Codex weekly usage diff"
            git push
          fi
